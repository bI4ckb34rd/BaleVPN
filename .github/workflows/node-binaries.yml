name: Node binaries

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.suffix }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,   target: node18-macos-arm64, suffix: macos-arm64, ext: '' }
          - { os: macos-26-intel, target: node18-macos-x64,   suffix: macos-x64,   ext: '' }
          - { os: ubuntu-latest,  target: node18-linux-x64,   suffix: linux-x64,   ext: '' }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: bale-vpn-node
        shell: bash

    steps:
      - uses: actions/checkout@v4

      # webrtc-sys / livekit transitively need glib, gtk, alsa, pulse,
      # dbus, udev dev headers on Linux. macOS / Windows runners get
      # their equivalents via the platform toolchain.
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libssl-dev \
            libglib2.0-dev libgtk-3-dev \
            libpulse-dev libasound2-dev \
            libdbus-1-dev libudev-dev

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: bale-vpn-node/package-lock.json

      # npm spawns its scripts with cmd.exe on Windows regardless of
      # the workflow's `shell: bash` default, and cmd.exe can't parse
      # the `../lktunnel-rust/patches/apply.sh` path (`/` is a switch
      # separator). Point npm at git-bash, which is preinstalled on
      # windows-latest runners and is also honored by nested
      # `npm run` calls inside scripts.
      - name: Use bash for npm scripts (Windows)
        if: runner.os == 'Windows'
        run: npm config set script-shell bash

      # The Node app now links against a napi-rs binding
      # (`bale-vpn-node/rust/lktunnel-node/`) that wraps the shared
      # `lktunnel` core. It depends on the same vendored crates as the
      # rest of the project, so we need the same Rust toolchain +
      # patches dance as the Android workflow before any cargo step
      # runs.
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + napi target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            lktunnel-rust/patches/.cache
            bale-vpn-node/rust/target
          key: rust-node-${{ runner.os }}-${{ hashFiles('lktunnel-rust/Cargo.lock', 'bale-vpn-node/rust/lktunnel-node/Cargo.toml', 'lktunnel-rust/patches/*.patch') }}
          restore-keys: |
            rust-node-${{ runner.os }}-

      - name: Apply vendor crate patches
        run: ../lktunnel-rust/patches/apply.sh

      - name: Derive version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm ci

      # Compiles `rust/lktunnel-node` as a `.node` cdylib via
      # @napi-rs/cli. Output lands alongside the Rust crate; the
      # `pkg` packaging step picks it up via `package.json`'s
      # `pkg.assets`. Replaces the old `node-gyp build-tun` step
      # entirely — the Linux TUN ioctls live in this Rust crate now.
      - name: Build napi-rs binding
        run: npm run build:native

      - name: Package binary
        run: |
          npx pkg . \
            --target ${{ matrix.target }} \
            --output dist/balevpn-${{ steps.ver.outputs.version }}-${{ matrix.suffix }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: balevpn-${{ matrix.suffix }}
          path: bale-vpn-node/dist/balevpn-${{ steps.ver.outputs.version }}-${{ matrix.suffix }}${{ matrix.ext }}
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bale-vpn-node/dist/balevpn-${{ steps.ver.outputs.version }}-${{ matrix.suffix }}${{ matrix.ext }}
