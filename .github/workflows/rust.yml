name: Rust

# Runs the workspace test + build on every push and PR. The Android
# and Node-binaries workflows also exercise the same Rust code, but
# they're slow (webrtc-sys download + cross-compile + APK packaging
# / pkg packaging), so they only fire on tags. This job is the fast
# feedback loop — pure cargo test against the lktunnel core and its
# Node-binding sibling.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: cargo test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # Linux is the fast path; macOS catches darwin-specific build
        # issues in webrtc-sys (CoreAudio / VideoToolbox link flags
        # etc.) that don't surface on Linux. Windows catches the
        # cfg(unix) gating regressions in lktunnel's TUN / NAT code —
        # the prebuilt webrtc-sys for Windows is well-supported, but
        # our own crate has Unix-only paths that need to stay gated.
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # `apply.sh` is bash; PowerShell (Windows-latest's default) can't
    # parse it. git-bash is preinstalled on Windows runners — use it
    # for every `run:` step so the workflow is OS-uniform.
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      # webrtc-sys / livekit transitively need glib, gtk, alsa, pulse,
      # dbus, udev dev headers on Linux. macOS gets these via Homebrew
      # tooling already installed on the runner.
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libssl-dev \
            libglib2.0-dev libgtk-3-dev \
            libpulse-dev libasound2-dev \
            libdbus-1-dev libudev-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            lktunnel-rust/patches/.cache
            lktunnel-rust/target
            lk-signaling-rust/target
            bale-signaling-rust/target
            bale-vpn-rust/target
            bale-vpn-android/rust/target
          key: rust-test-${{ runner.os }}-${{ hashFiles('lktunnel-rust/Cargo.lock', 'lktunnel-rust/patches/*.patch', 'lk-signaling-rust/Cargo.toml', 'bale-signaling-rust/Cargo.toml', 'bale-vpn-rust/Cargo.toml') }}
          restore-keys: |
            rust-test-${{ runner.os }}-

      - name: Apply vendor crate patches
        working-directory: lktunnel-rust
        run: ./patches/apply.sh

      # Core workspace — what every consumer (CLI, Android
      # shim, bale-vpn-rust binary) ultimately links against.
      # Test runs first because it's the only step that catches
      # behaviour regressions; `cargo build` would still succeed
      # on a broken unit test.
      - name: cargo test --workspace
        working-directory: lktunnel-rust
        run: cargo test --workspace --release

      - name: cargo build --workspace
        working-directory: lktunnel-rust
        run: cargo build --workspace --release

      - name: cargo clippy --workspace
        working-directory: lktunnel-rust
        # `-D warnings` would be nice but the vendored livekit crate
        # ships 34 warnings of its own; we only want to fail on
        # warnings we introduced. `-A clippy::all` then explicit
        # opt-ins is the inverse approach — for now just run clippy
        # for visibility, don't gate the build on it.
        run: cargo clippy --workspace --release --no-deps

      # bale-vpn-rust — the single Rust binary replacing the
      # deleted Node app. Builds for host, exercises the HTTP
      # UI + axum routes + signaling wiring at compile time.
      #
      # Headless (`--no-default-features`): this fast job doesn't install
      # the GUI deps (libsoup-3.0 / webkit2gtk that `wry` needs via the
      # default `gui` feature), and shouldn't — the windowed build is
      # covered by bale-vpn-rust.yml, which does install them. Building
      # the headless binary here keeps the compile-time coverage (axum /
      # signaling / NAT wiring) without dragging webkit into the test job.
      - name: cargo build (bale-vpn-rust, headless)
        working-directory: bale-vpn-rust
        run: cargo build -p bale-vpn --release --no-default-features

      # ── Signaling stack ──────────────────────────────────────
      #
      # `lk-signaling-rust/` is the generic trait crate; cheap
      # pure-Rust (async-trait + tokio). `bale-signaling-rust/`
      # is the Bale impl on top — also pure Rust (reqwest /
      # tokio-tungstenite / rustls). Both ship their own unit
      # tests (~100 in total covering proto codec, gRPC-web,
      # WS framing, RPC pending machinery, contact parsing,
      # trait dispatch). Fast — finishes in under 30s per OS.

      - name: cargo test (lk-signaling)
        working-directory: lk-signaling-rust
        run: cargo test --workspace --release

      - name: cargo test (bale-signaling)
        working-directory: bale-signaling-rust
        run: cargo test --workspace --release

      # The Android JNI shim depends on bale-signaling + jni;
      # confirms the FFI shape compiles for the host target.
      # The full Android build (cargo-ndk → arm64) is exercised
      # by android.yml when a release tag is pushed.
      - name: cargo build (android jni shim)
        working-directory: bale-vpn-android/rust
        run: cargo build -p bale-signaling-android --release
