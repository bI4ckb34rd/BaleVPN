name: Android build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
    defaults:
      run:
        working-directory: bale-vpn-android

    steps:
      - uses: actions/checkout@v4

      # The runner image's preinstalled NDK 28 is sometimes incomplete
      # (missing source.properties → cargo-ndk fails with os error 2).
      # Install the exact NDK we pin in shared/build.gradle.kts so the
      # build is reproducible regardless of which image GitHub serves.
      # Keep NDK_VERSION in sync with `ndkVersion` in shared/build.gradle.kts.
      - name: Install pinned Android NDK
        run: |
          NDK_VERSION="28.0.13004108"
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            --install "ndk;$NDK_VERSION"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/$NDK_VERSION" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/$NDK_VERSION" >> "$GITHUB_ENV"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # The Android Rust workspace patches webrtc-sys / libwebrtc /
      # livekit / livekit-api via [patch.crates-io] = path = "vendor/…".
      # The vendor/ tree is gitignored — it's regenerated from a
      # pristine crates.io copy + the patches in lktunnel-rust/patches/
      # by apply.sh. Must run BEFORE any cargo step (including the one
      # gradle's cargoBuild task triggers), otherwise cargo can't
      # resolve the patched paths.
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Cache cargo registry, bin, target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            lktunnel-rust/patches/.cache
            lktunnel-rust/target
            bale-vpn-android/rust/target
          key: rust-${{ runner.os }}-${{ hashFiles('lktunnel-rust/Cargo.lock', 'bale-vpn-android/rust/Cargo.lock', 'lktunnel-rust/patches/*.patch') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - name: Install cargo-ndk
        # `--locked` for reproducibility; the `command -v` guard makes
        # the step a no-op on cache hits (cargo install would otherwise
        # still spend a few seconds checking versions).
        run: command -v cargo-ndk >/dev/null || cargo install cargo-ndk --locked

      - name: Apply vendor crate patches
        working-directory: lktunnel-rust
        run: ./patches/apply.sh

      - name: Derive version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "BALE_VERSION_NAME=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Decode keystore
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.ANDROID_KEYSTORE_PASSWORD || '' }}
          ANDROID_KEY_ALIAS:        ${{ startsWith(github.ref, 'refs/tags/v') && secrets.ANDROID_KEY_ALIAS        || '' }}
          ANDROID_KEY_PASSWORD:     ${{ startsWith(github.ref, 'refs/tags/v') && secrets.ANDROID_KEY_PASSWORD     || '' }}
        run: ./gradlew :androidApp:assembleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BaleVpn-release-apk
          path: bale-vpn-android/androidApp/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bale-vpn-android/androidApp/build/outputs/apk/release/*.apk
