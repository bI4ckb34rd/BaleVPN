name: bale-vpn-rust binaries

# CI for the desktop binary that replaced the Node app.
#
#   - push / PR: build the binary on Linux + macOS + Windows so a
#     change that breaks the GUI feature (tao/wry) or the
#     userspace-NAT path (Windows-only quirks) gets caught early.
#   - tag `v*`: also package + attach the binaries to the GitHub
#     Release. The release tag is shared with the Android workflow,
#     so a single `git tag v0.1.0 && git push --tags` ships APK +
#     desktop binaries together.
#
# The headless variant (no GUI) is built alongside the GUI one
# on the same matrix runner — `--no-default-features` drops tao /
# wry, useful for server deployments. The two outputs are
# uploaded as separate artifacts.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed for softprops/action-gh-release on tags

jobs:
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os:           ubuntu-latest
            artifact_os:  linux-x86_64
            bin_ext:      ''
          - os:           macos-latest
            artifact_os:  macos-aarch64
            bin_ext:      ''
          # macos-latest is Apple Silicon (arm64). macos-26-intel is the
          # Intel (x86_64) runner — build natively there so the release
          # ships a macOS Intel binary too (the webrtc-rs stack is pure
          # Rust, so this is a plain native build, no cross-compile).
          #
          # This restores the macOS Intel binary dropped (unintentionally)
          # in 8336ed4 "QUIC integration", when the Node-app's
          # node-binaries.yml — which built it via this same macos-26-intel
          # runner — was replaced by bale-vpn-rust.yml. Last shipped in
          # v1.3.2. Runner label matches ab6397f "Use a new OSX 64x builder"
          # (the project moved off macos-13 deliberately).
          - os:           macos-26-intel
            artifact_os:  macos-x86_64
            bin_ext:      ''
          - os:           windows-latest
            artifact_os:  windows-x86_64
            bin_ext:      '.exe'
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
        working-directory: bale-vpn-rust

    steps:
      - uses: actions/checkout@v4

      # The GUI feature (tao + wry) needs GTK / glib / libsoup /
      # webkit2gtk dev headers on Linux. macOS gets these via system
      # frameworks; Windows ships the WebView2 runtime that wry uses.
      # (No audio/libwebrtc headers anymore — the transport is webrtc-rs.)
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libssl-dev \
            libglib2.0-dev libgtk-3-dev \
            libsoup-3.0-dev libwebkit2gtk-4.1-dev

      # macos-26-intel (and other newer slimmed runner images) don't ship
      # rustup, which dtolnay/rust-toolchain assumes is preinstalled — so
      # the next step can't put cargo on PATH and the build fails with
      # "cargo: command not found". Install rustup if missing and add
      # ~/.cargo/bin to PATH. No-op on images that already have it.
      - name: Ensure rustup + stable toolchain (macOS)
        if: runner.os == 'macOS'
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --profile minimal --default-toolchain stable
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          # Make cargo usable in THIS step too (sanity-check the install).
          "$HOME/.cargo/bin/cargo" --version || true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            lktunnel-rust/target
            bale-vpn-rust/target
          # Key on artifact_os, not runner.os: macos-latest (arm64) and
          # macos-26-intel (x86_64) both report runner.os == "macOS", so a
          # shared key would let the Intel runner restore the arm64
          # runner's ~/.cargo/bin + target (wrong-arch toolchain/objects).
          key: bale-vpn-rust-${{ matrix.artifact_os }}-${{ hashFiles('lktunnel-rust/Cargo.lock', 'bale-vpn-rust/Cargo.toml') }}
          restore-keys: |
            bale-vpn-rust-${{ matrix.artifact_os }}-

      # GUI binary — default features (`gui` is on by default;
      # produces the windowed desktop variant). The same binary
      # respects `--headless` at runtime when the user wants the
      # HTTP-only mode on a desktop machine, but the headless build
      # below is the right pick for server deployments where the
      # tao / wry deps would otherwise add ~50MB of native libs.
      - name: cargo build --release  (gui)
        run: cargo build -p bale-vpn --release

      - name: Stage GUI artifact
        run: |
          mkdir -p ../release-staging
          cp target/release/bale-vpn${{ matrix.bin_ext }} \
             ../release-staging/bale-vpn-gui-${{ matrix.artifact_os }}${{ matrix.bin_ext }}

      # Headless binary — drops tao + wry. Same source, just the
      # `gui` feature off. Lands as a separate artifact so server
      # deployers can grab a smaller binary without the desktop
      # libs.
      - name: cargo build --release --no-default-features  (headless)
        run: cargo build -p bale-vpn --release --no-default-features

      - name: Stage headless artifact
        run: |
          cp target/release/bale-vpn${{ matrix.bin_ext }} \
             ../release-staging/bale-vpn-headless-${{ matrix.artifact_os }}${{ matrix.bin_ext }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bale-vpn-${{ matrix.artifact_os }}
          path: release-staging/*
          if-no-files-found: error

      - name: Attach binaries to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release-staging/*
