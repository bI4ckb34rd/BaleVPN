# Windows MSVC: link against the static C runtime (/MT) to match the
# prebuilt libwebrtc.lib and webrtc-sys's C++ shims, which are compiled
# /MT. Rust defaults to the dynamic CRT (/MD) on this target, and mixing
# /MT with /MD trips the MSVC linker with LNK2038 ("mismatch detected
# for 'RuntimeLibrary': value 'MT_StaticRelease' doesn't match value
# 'MD_DynamicRelease'"). Only affects the Windows-MSVC target — Linux,
# macOS, and Android (aarch64-linux-android) builds are untouched.
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]
